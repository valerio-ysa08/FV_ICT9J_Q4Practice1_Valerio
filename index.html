<body>
    <h1>JavaScript Conditional Statements</h1>
    
    <h2>Check Age Classification</h2>
    <br>
    <button class="btn btn-info" onclick="checkAge()">Check Age</button>

    <script>
        function checkAge(){
            var age = 15;
            if (isNan(age) || age< 0) {
                alert("Kindly input a valid number.");
            }
            else if(age <18){
                alert("You are underage.");
            }
            else if(age>=18){
                alert("Your are of legal age.");
            }
            else{
                alert("Age could not be classified.");
            }

        }
    </script>


</body>
</html>
